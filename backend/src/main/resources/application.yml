spring:
  application:
    name: fundpilot-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/fundpilot}
    username: ${DB_USERNAME:fundpilot}
    password: ${DB_PASSWORD:fundpilot}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        # prometheus:供 fundpilot_default 网络内 Prometheus 抓取(backend 不映射宿主端口,公网不可达)
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
