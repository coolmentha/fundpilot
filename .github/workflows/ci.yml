# CI:push / PR 时跑后端测试 + 前端构建验证。
# 后端 mvn verify 含 testcontainers 集成测试(GitHub runner 自带 Docker)。
# 前端无 lint/test(项目本就没有),只验 build 能产出 dist。
name: CI

on:
  push:
    branches: [ '**' ]
  pull_request:

jobs:
  backend-test:
    name: Backend test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      # surefire 已排除 live 组(pom.xml excludedGroups=live),CI 不跑直连东方财富的 live 测试
      - name: Maven verify
        run: ./mvnw -B verify

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build
