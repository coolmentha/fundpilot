# CI:push / PR 时跑后端测试 + 前端构建验证。
# 后端 mvn verify 含 testcontainers 集成测试(GitHub runner 自带 Docker)。
# 前端无 lint/test(项目本就没有),只验 build 能产出 dist。
name: CI

on:
  push:
    branches: [ '**' ]
  pull_request:

jobs:
  backend-test:
    name: Backend test
    runs-on: ubuntu-latest
    # 集成测试继承 AbstractIntegrationTest(@ActiveProfiles("test")),
    # 连 localhost:5432(application-test.yml 默认值)。用 service container 提供同址 PG,
    # 匹配本地开发环境,无需改测试代码。
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: fundpilot
          POSTGRES_USER: fundpilot
          POSTGRES_PASSWORD: fundpilot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fundpilot -d fundpilot"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5

      - name: Setup JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      # surefire 已排除 live 组(pom.xml excludedGroups=live),CI 不跑直连东方财富的 live 测试
      - name: Maven verify
        run: ./mvnw -B verify

      # jacoco 在 verify 阶段生成报告(pom.xml 已配 report execution),上传 artifact 便于下载查看
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: backend/target/site/jacoco/
          retention-days: 7

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build
