# CD:打 tag v* 时构建镜像推 GHCR,SSH 到 VPS 拉镜像重启。
# 需配置仓库 Secrets:VPS_HOST / VPS_USER / VPS_SSH_KEY / VPS_PATH
# VPS 须先 docker login ghcr.io(拉私有镜像),并 clone 仓库到 VPS_PATH、建好 .env
name: Deploy

on:
  push:
    tags: [ 'v*' ]

jobs:
  build-push:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - context: backend
            image: ghcr.io/coolmentha/fundpilot-backend
          - context: frontend
            image: ghcr.io/coolmentha/fundpilot-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-push
    env:
      DB_USERNAME: ${{ secrets.DB_USERNAME }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: DB_USERNAME, DB_PASSWORD
          script: |
            set -e
            # 首次:目录不存在则 clone;之后:fetch + checkout 到 tag
            if [ ! -d ${{ secrets.VPS_PATH }}/.git ]; then
              git clone https://github.com/coolmentha/fundpilot.git ${{ secrets.VPS_PATH }}
            fi
            cd ${{ secrets.VPS_PATH }}
            git fetch --tags
            git checkout ${{ github.ref_name }}

            # 动态生成 .env(机密从 Secrets 注入,不落工作流日志)
            cat > .env <<EOF
            DB_USERNAME=$DB_USERNAME
            DB_PASSWORD=$DB_PASSWORD
            TAG=${{ github.ref_name }}
            EOF
            chmod 600 .env

            TAG=${{ github.ref_name }} docker compose -f deploy/docker-compose.prod.yml pull
            TAG=${{ github.ref_name }} docker compose -f deploy/docker-compose.prod.yml up -d

      - name: Smoke test
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # backend/frontend 都只 expose 不映射宿主端口,外部唯一入口是 Caddy 的 443(映射到宿主)
            # 用 --resolve 把域名强制指向 127.0.0.1,走本机回环到 Caddy,避开 hairpin NAT 问题
            # 等 backend 起来(最多 60s),探 actuator health
            for i in $(seq 1 30); do
              if curl -sf --resolve www.fundpilot.duckdns.org:443:127.0.0.1 https://www.fundpilot.duckdns.org/actuator/health | grep -q '"status":"UP"'; then
                echo "backend healthy"
                exit 0
              fi
              sleep 2
            done
            echo "backend not healthy" >&2
            docker compose -f ${{ secrets.VPS_PATH }}/deploy/docker-compose.prod.yml logs --tail=50 backend
            exit 1

