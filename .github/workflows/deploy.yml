# CD:打 tag v* 时构建镜像推 GHCR,SSH 到 VPS 拉镜像重启。
# 需配置仓库 Secrets:VPS_HOST / VPS_USER / VPS_SSH_KEY / VPS_PATH / DB_USERNAME / DB_PASSWORD
# VPS 须先 docker login ghcr.io(拉私有镜像);clone 仓库与 .env 由本工作流自动完成
name: Deploy

on:
  push:
    tags: [ 'v*' ]

jobs:
  build-push:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - context: backend
            image: ghcr.io/coolmentha/fundpilot-backend
          - context: frontend
            image: ghcr.io/coolmentha/fundpilot-frontend
    steps:
      - uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-push
    env:
      DB_USERNAME: ${{ secrets.DB_USERNAME }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: DB_USERNAME, DB_PASSWORD
          script: |
            set -e
            # 首次:目录不存在则 clone;之后:fetch + checkout 到 tag
            if [ ! -d ${{ secrets.VPS_PATH }}/.git ]; then
              git clone https://github.com/coolmentha/fundpilot.git ${{ secrets.VPS_PATH }}
            fi
            cd ${{ secrets.VPS_PATH }}
            # --force:允许覆盖本地已有同名 tag(重打 tag 时 VPS 本地旧 tag 要被远端覆盖)
            git fetch --tags --force
            git checkout ${{ github.ref_name }}

            # 动态生成 .env(机密从 Secrets 注入,不落工作流日志)
            cat > .env <<EOF
            DB_USERNAME=$DB_USERNAME
            DB_PASSWORD=$DB_PASSWORD
            TAG=${{ github.ref_name }}
            EOF
            chmod 600 .env

            TAG=${{ github.ref_name }} docker compose -p fundpilot -f deploy/docker-compose.prod.yml pull
            TAG=${{ github.ref_name }} docker compose -p fundpilot -f deploy/docker-compose.prod.yml up -d

      - name: Smoke test
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # 直连 backend 容器探 actuator health(绕过 Caddy/nginx 入口层,且不把 actuator 暴露公网)
            # -T 关闭 TTY 分配(非交互 SSH 下 exec 需要);backend 启动含 Flyway 首次迁移,最多等 90s
            for i in $(seq 1 45); do
              if docker compose -p fundpilot -f ${{ secrets.VPS_PATH }}/deploy/docker-compose.prod.yml exec -T backend curl -sf http://localhost:8080/actuator/health | grep -q '"status":"UP"'; then
                echo "backend healthy"
                exit 0
              fi
              sleep 2
            done
            echo "backend not healthy" >&2
            docker compose -p fundpilot -f ${{ secrets.VPS_PATH }}/deploy/docker-compose.prod.yml logs --tail=50 backend
            exit 1

