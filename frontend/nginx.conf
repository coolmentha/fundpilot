# FundPilot 前端 Nginx 配置。
# 前端 API 调用用纯相对路径 /api/...(见 src/api/client.js),
# 生产由本 Nginx 把 /api/ 反代到 compose 内的 backend 服务,其余走 SPA fallback。
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 后端 API 反代:compose 服务名 backend,端口 8080
    # X-Forwarded-Proto 写死 https:对外入口(caddy)是 https,nginx 用 $scheme 会传 http 误导后端
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Grafana 反代:服务名 fundpilot-grafana(监控栈 compose,与 frontend 同在 fundpilot_default 网络)
    # proxy_pass 不带末尾 /:serve_from_sub_path=true 时 grafana 需收到带 /grafana 前缀的完整路径自己处理
    # 带末尾 / 会剥掉前缀 → grafana 收到 /login 触发重定向规范化 → 死循环
    location /grafana/ {
        proxy_pass http://fundpilot-grafana:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # SPA 路由 fallback:未命中的路径都回 index.html 交给前端路由
    location / {
        try_files $uri $uri/ /index.html;
    }
}
