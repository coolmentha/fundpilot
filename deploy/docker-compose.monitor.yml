# 监控栈编排:VPS 上 docker compose -p fundpilot-monitor -f deploy/docker-compose.monitor.yml up -d
#
# 独立于应用 tag CD,一次性手动起。复用 fundpilot_default 网络(Prometheus 按容器名抓 backend,
# Grafana 不需接 backend),Grafana UI 经 frontend 的 nginx /grafana/ 反代转入(见 frontend/nginx.conf)。
#
# 首次起后改 Grafana admin 密码:
#   docker exec fundpilot-grafana grafana-cli admin reset-admin-password <强口令>
services:
  prometheus:
    image: prom/prometheus
    container_name: fundpilot-prometheus
    restart: unless-stopped
    volumes:
      - ./monitor/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - fundpilot_default

  grafana:
    image: grafana/grafana
    container_name: fundpilot-grafana
    restart: unless-stopped
    environment:
      # DOMAIN:设了 domain grafana 才信任 X-Forwarded-Proto 头,识别对外是 https
      # 不设时 grafana 用自身监听的 http,与 ROOT_URL 的 https 冲突 → 一直 301 到 https → 死循环
      GF_SERVER_DOMAIN: "www.fundpilot.duckdns.org"
      # DOMAIN:设了 grafana 才信任 nginx 透传的 X-Forwarded-Proto,正确识别对外是 https(避免重定向循环)
      GF_SERVER_DOMAIN: "www.fundpilot.duckdns.org"
      # ROOT_URL 写死完整地址:%(domain)s 默认 localhost,会让 grafana 把重定向/资源链接生成成
      # https://localhost/grafana/,经 nginx 反代访问 /grafana/ 时浏览器跳 localhost 报"拒绝连接"
      GF_SERVER_ROOT_URL: "https://www.fundpilot.duckdns.org/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      # 允许 iframe 嵌入前端 /monitor 页(仍保留登录鉴权,不裸奔)
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitor/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - fundpilot_default

# external:复用应用 compose 的默认网络(Prometheus 才能按 fundpilot-backend 容器名抓指标)
networks:
  fundpilot_default:
    external: true
    name: fundpilot_default

volumes:
  prometheus-data:
  grafana-data:
